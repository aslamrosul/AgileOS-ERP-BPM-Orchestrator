services:
  agileos-db:
    image: surrealdb/surrealdb:latest
    container_name: agileos-db
    ports:
      - "8002:8000"  # Changed to avoid conflict
    command: start --log info --user root --pass root memory
    environment:
      - SURREAL_USER=root
      - SURREAL_PASS=root
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - agileos-network

  agileos-nats:
    image: nats:latest
    container_name: agileos-nats
    ports:
      - "4223:4222"  # Changed to avoid conflict
      - "8223:8222"  # Changed to avoid conflict
    command: "-js -m 8222"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - agileos-network

networks:
  agileos-network:
    driver: bridge

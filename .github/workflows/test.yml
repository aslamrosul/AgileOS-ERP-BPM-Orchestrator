name: Automated Testing CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    name: Backend Go Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23'
    
    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    
    - name: Install dependencies
      working-directory: ./agile-os/backend-go
      run: |
        go mod download
        go mod tidy
        go install github.com/stretchr/testify@latest
    
    - name: Run unit tests
      working-directory: ./agile-os/backend-go
      run: go test ./... -v -cover -coverprofile=coverage.out
    
    - name: Generate coverage report
      working-directory: ./agile-os/backend-go
      run: |
        go tool cover -func=coverage.out
        go tool cover -html=coverage.out -o coverage.html
    
    - name: Check coverage threshold
      working-directory: ./agile-os/backend-go
      run: |
        COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
        echo "Total coverage: $COVERAGE%"
        if (( $(echo "$COVERAGE < 70" | bc -l) )); then
          echo "Coverage is below 70% threshold"
          exit 1
        fi
    
    - name: Upload coverage report
      uses: actions/upload-artifact@v3
      with:
        name: backend-coverage
        path: ./agile-os/backend-go/coverage.html

  frontend-tests:
    name: Frontend Next.js Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './agile-os/frontend-next/package-lock.json'
    
    - name: Install dependencies
      working-directory: ./agile-os/frontend-next
      run: npm ci
    
    - name: Run tests
      working-directory: ./agile-os/frontend-next
      run: npm run test -- --run
    
    - name: Generate coverage report
      working-directory: ./agile-os/frontend-next
      run: npm run test:coverage -- --run
    
    - name: Upload coverage report
      uses: actions/upload-artifact@v3
      with:
        name: frontend-coverage
        path: ./agile-os/frontend-next/coverage/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    
    services:
      surrealdb:
        image: surrealdb/surrealdb:latest
        ports:
          - 8000:8000
        options: >-
          --health-cmd "curl -f http://localhost:8000/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      nats:
        image: nats:latest
        ports:
          - 4222:4222
          - 8222:8222
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23'
    
    - name: Run integration tests
      working-directory: ./agile-os/backend-go
      env:
        SURREAL_URL: http://localhost:8000/rpc
        NATS_URL: nats://localhost:4222
      run: go test ./tests/... -v

  python-tests:
    name: Python Analytics Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      working-directory: ./agile-os/analytics-py
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Run Python tests
      working-directory: ./agile-os/analytics-py
      run: |
        pytest tests/ -v --cov=. --cov-report=html || true
    
    - name: Upload coverage report
      uses: actions/upload-artifact@v3
      with:
        name: python-coverage
        path: ./agile-os/analytics-py/htmlcov/

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, integration-tests, python-tests]
    if: always()
    
    steps:
    - name: Check test results
      run: |
        echo "All tests completed!"
        echo "Backend Tests: ${{ needs.backend-tests.result }}"
        echo "Frontend Tests: ${{ needs.frontend-tests.result }}"
        echo "Integration Tests: ${{ needs.integration-tests.result }}"
        echo "Python Tests: ${{ needs.python-tests.result }}"
    
    - name: Fail if any tests failed
      if: needs.backend-tests.result != 'success' || needs.frontend-tests.result != 'success'
      run: exit 1
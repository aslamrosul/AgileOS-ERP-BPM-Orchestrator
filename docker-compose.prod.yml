version: '3.8'

services:
  # SurrealDB - Graph Database
  agileos-db:
    image: surrealdb/surrealdb:latest
    container_name: agileos-db-prod
    restart: unless-stopped
    ports:
      - "8002:8000"  # Changed from 8000 to 8002
    command: start --log info --user ${SURREAL_USER:-root} --pass ${SURREAL_PASS:-root} file:/data/database.db
    environment:
      - SURREAL_USER=${SURREAL_USER:-root}
      - SURREAL_PASS=${SURREAL_PASS:-root}
    volumes:
      - surrealdb-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - agileos-network

  # NATS - Message Broker
  agileos-nats:
    image: nats:latest
    container_name: agileos-nats-prod
    restart: unless-stopped
    ports:
      - "4223:4222"  # Changed from 4222 to 4223
      - "8223:8222"  # Changed from 8222 to 8223
    command: "-js -m 8222"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - agileos-network

  # Backend - Go API
  agileos-backend:
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    container_name: agileos-backend-prod
    restart: unless-stopped
    ports:
      - "8081:8080"  # Changed from 8080 to 8081
    environment:
      - SURREAL_URL=ws://agileos-db:8000/rpc
      - SURREAL_USER=${SURREAL_USER:-root}
      - SURREAL_PASS=${SURREAL_PASS:-root}
      - NATS_URL=nats://agileos-nats:4222
      - PORT=8080
      - GIN_MODE=release
    depends_on:
      agileos-db:
        condition: service_healthy
      agileos-nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - agileos-network

  # Frontend - Next.js
  agileos-frontend:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
    container_name: agileos-frontend-prod
    restart: unless-stopped
    ports:
      - "3001:3000"  # Changed from 3000 to 3001
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://agileos-backend:8080
      - PORT=3000
    depends_on:
      - agileos-backend
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s
    networks:
      - agileos-network

  # Nginx - Reverse Proxy
  agileos-nginx:
    image: nginx:alpine
    container_name: agileos-nginx-prod
    restart: unless-stopped
    ports:
      - "8090:80"    # Changed from 80 to 8090
      - "8443:443"   # Changed from 443 to 8443
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - agileos-frontend
      - agileos-backend
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - agileos-network

networks:
  agileos-network:
    driver: bridge
    name: agileos-prod-network

volumes:
  surrealdb-data:
    name: agileos-surrealdb-data
